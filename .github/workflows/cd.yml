name: 'Continuous Delivery'

on:
  workflow_call:
    secrets: inherit

  workflow_dispatch:

env: ${{ vars }}

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/${{ secrets.REPOSITORY }}/${{ secrets.SERVICE }}:${{ github.sha }}
            ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/${{ secrets.REPOSITORY }}/${{ secrets.SERVICE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ secrets.SERVICE }}
          region: ${{ secrets.REGION }}
          image: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/${{ secrets.REPOSITORY }}/${{ secrets.SERVICE }}:${{ github.sha }}
          env_vars: |-
            ENVIRONMENT=${{ secrets.TARGET_ENVIRONMENT }}
            DEBUG=${{ env.DEBUG }}
            PROJECT_NAME=${{ env.PROJECT_NAME }}
            VERSION=${{ env.VERSION }}
            DESCRIPTION=${{ env.DESCRIPTION }}
