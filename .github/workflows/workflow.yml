name: CI/CD

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  cd:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/cd.yml
