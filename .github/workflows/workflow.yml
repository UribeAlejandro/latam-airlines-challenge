name: Workflow

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  id-token: 'write'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  cd:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/cd.yml
